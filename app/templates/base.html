<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <title>{% block title %}{{ app_name | default("Leadfinder") }}{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/main.css">
  {% block head %}{% endblock %}
</head>
<body>
  <div class="app-shell">
    <header class="site-header">
      <div class="container header-inner">
        <a href="/" class="brand">
          <span>{{ app_name | default("Leadfinder") }}</span>
          <span class="brand-tagline">OIS Lead Discovery</span>
        </a>
        <button type="button" class="nav-toggle" aria-expanded="false" aria-controls="main-nav" aria-label="Open navigation menu">
          <span class="nav-toggle-bar"></span>
          <span class="nav-toggle-bar"></span>
          <span class="nav-toggle-bar"></span>
        </button>
        <nav class="main-nav" id="main-nav">
          <a href="/" class="{% if active_nav == 'home' %}nav-active{% endif %}">Dashboard</a>
          <a href="/leads" class="{% if active_nav == 'leads' %}nav-active{% endif %}">Leads</a>
          <a href="/scans" class="{% if active_nav == 'scans' %}nav-active{% endif %}">Scans</a>
          <a href="/inspections" class="{% if active_nav == 'inspections' %}nav-active{% endif %}">Inspections</a>
          <a href="/outreach" class="{% if active_nav == 'outreach' %}nav-active{% endif %}">Drafts</a>
          <a href="/exports" class="{% if active_nav == 'exports' %}nav-active{% endif %}">Exports</a>
          <a href="/schedules" class="{% if active_nav == 'schedules' %}nav-active{% endif %}">Schedules</a>
          <a href="/settings" class="{% if active_nav == 'settings' %}nav-active{% endif %}">Settings</a>
        </nav>
      </div>
    </header>

    <main class="app-main">
      <div class="container">
        {% include "partials/flash.html" %}
        {% block content %}{% endblock %}
      </div>
    </main>

    <footer class="site-footer">
      <div class="container">
        <span>OIS Lead Discovery Platform</span>
        {% if version %}<span class="muted">v{{ version }}</span>{% endif %}
      </div>
    </footer>
  </div>
  <script>
  (function () {
    var toggle = document.querySelector(".nav-toggle");
    var nav = document.getElementById("main-nav");
    if (!toggle || !nav) return;

    function setOpen(open) {
      document.body.classList.toggle("nav-open", open);
      toggle.setAttribute("aria-expanded", open ? "true" : "false");
      toggle.setAttribute("aria-label", open ? "Close navigation menu" : "Open navigation menu");
    }

    toggle.addEventListener("click", function () {
      setOpen(!document.body.classList.contains("nav-open"));
    });

    nav.querySelectorAll("a").forEach(function (link) {
      link.addEventListener("click", function () { setOpen(false); });
    });

    document.addEventListener("keydown", function (event) {
      if (event.key === "Escape") setOpen(false);
    });

    window.addEventListener("resize", function () {
      if (window.matchMedia("(min-width: 769px)").matches) setOpen(false);
    });
  })();
  </script>
</body>
</html>
