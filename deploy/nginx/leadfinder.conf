# Internal LAN reverse proxy for Leadfinder.
# Proxies HTTP to the app container — no public TLS or internet exposure assumed.
#
# Enable with: docker compose -f docker-compose.prod.yml --profile proxy up -d

upstream leadfinder_app {
    server app:8000;
    keepalive 8;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20m;

    access_log /var/log/nginx/leadfinder.access.log;
    error_log /var/log/nginx/leadfinder.error.log warn;

    location /static/ {
        proxy_pass http://leadfinder_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        expires 1h;
    }

    location / {
        proxy_pass http://leadfinder_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
